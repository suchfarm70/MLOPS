<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 { color: #ffffff; font-weight: 300; }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #1e1e1e;
            color: #dcdcaa; /* Syntax highlight feel */
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #4a4a4a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover { background-color: #5a5a5a; }

        /* The Results Box */
        #results {
            margin-top: 30px;
            padding: 20px;
            background-color: #1e1e1e;
            border-left: 4px solid #4a4a4a;
            display: none; /* Hidden until we get a result */
        }
        .severity { font-weight: bold; margin-bottom: 10px; }
        .critical { color: #f48771; }
        .pass { color: #89d185; }
        .fixed-code {
            background-color: #000000;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <h1>Automated Code Audit</h1>

    <div class="container">
        <textarea id="codeInput" placeholder="Paste your Java code here..."></textarea>
        <button onclick="sendToAI()" id="testBtn">Run AI Audit</button>

        <div id="results">
            <div class="severity" id="severityOutput"></div>
            <p id="issueOutput"></p>
            <h3>Suggested Fix:</h3>
            <div class="fixed-code" id="codeOutput"></div>
        </div>
    </div>

    <script>
        async function sendToAI() {
            const rawCode = document.getElementById('codeInput').value;
            const btn = document.getElementById('testBtn');
            const resultsDiv = document.getElementById('results');

            if (!rawCode.trim()) { alert("Please paste some code first!"); return; }

            // Loading state
            btn.innerText = "AI is thinking...";
            btn.disabled = true;
            resultsDiv.style.display = 'none';

            try {
                // 1. Send the HTTP request to your local FastAPI server
                const response = await fetch('/api/v1/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // We structure the JSON exactly how FastAPI expects it
                    body: JSON.stringify({ code: rawCode, language: "Java" })
                });

                if (!response.ok) throw new Error("Server Error");

                // 2. Wait for the JSON response
                const data = await response.json();

                // 3. Inject the AI's data directly into the HTML
                document.getElementById('severityOutput').innerText = `Severity: ${data.severity}`;
                document.getElementById('severityOutput').className = `severity ${data.severity.toLowerCase()}`;
                document.getElementById('issueOutput').innerText = data.issue;
                document.getElementById('codeOutput').innerText = data.fixed_code;

                // Show the results box
                resultsDiv.style.display = 'block';

            } catch (error) {
                alert("Failed to connect to the AI Server. Is uvicorn running?");
                console.error(error);
            } finally {
                // Reset button
                btn.innerText = "Run AI Audit";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

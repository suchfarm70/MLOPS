name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SSH deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # If repo doesn't exist on server, clone it. Otherwise, pull latest.
            if [ ! -d "MLOPS-master" ]; then
              git clone https://github.com/${{ github.repository }}.git MLOPS-master
            fi
            
            cd MLOPS-master
            git pull origin main
            
            # Restart Application using modern Docker Compose
            sudo docker compose down
            sudo docker compose up -d --build
